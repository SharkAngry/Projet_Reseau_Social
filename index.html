<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réseau Social</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div id="app"></div>

    <div id="auth-container">
    
    <div id="login-box" class="auth-card">
        <h2>Connexion à votre réseau</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Adresse Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label for="login-password">Mot de passe</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>
        <p><a href="#" id="link-forgot">Mot de passe oublié ?</a></p>
        <p>Pas encore inscrit ? <a href="#" id="link-register">Créer un compte</a></p>
    </div>

    <div id="register-box" class="auth-card" style="display: none;">
        <h2>Créer un compte</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="reg-nom">Nom</label>
                <input type="text" id="reg-nom" required>
            </div>
            <div class="form-group">
                <label for="reg-prenom">Prénom</label>
                <input type="text" id="reg-prenom" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Adresse Email</label>
                <input type="email" id="reg-email" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Mot de passe</label>
                <input type="password" id="reg-password" required>
            </div>
            <button type="submit">S'inscrire</button>
        </form>
        <p>Déjà un compte ? <a href="#" id="link-login">Se connecter</a></p>
    </div>

</div>

<div id="app-container" style="display: none;">
    <header>
        <h1>Mon Réseau Social</h1>
        <button id="btn-logout">Déconnexion</button>
    </header>
    <main>
        </main>
</div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/profile.js"></script>
    <script src="assets/js/friends.js"></script>
  </body>
</html>
