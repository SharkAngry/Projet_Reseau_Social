<div class="auth-container">
  <h1>Nouveau mot de passe</h1>
  <form id="reset-form">
    <input
      type="password"
      id="reset-password"
      placeholder="Nouveau mot de passe"
      required
    />
    <button type="submit">Réinitialiser</button>
  </form>
  <p id="reset-message"></p>
</div>
